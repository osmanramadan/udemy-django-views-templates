{% extends "base.html" %}

{% block content %}

<style>
    .container {
        max-width: 800px;
        margin: 40px auto;
    }

    .card {
        background: white;
        padding: 25px;
        margin-bottom: 30px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        transition: 0.3s ease;
    }

    .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }

    .card h1 {
        margin-top: 0;
        color: #222;
        font-size: 28px;
    }

    .card p {
        color: #555;
        line-height: 1.7;
        font-size: 16px;
    }
</style>

<div class="container">
    {% for i in object %}
        <div class="card">
                    <div style="display: flex;align-items: center;justify-content:end;">
        <a href="{% url 'blog' %}" 
           style="text-decoration: none; font-size: 30px;font-weight: bold;">
          
        →

        </a>
        </div>
            {% if i.image %}
                <img src="{{ i.image.url }}" alt="{{ i.name }}" style="max-width: 100%; height: auto; margin-bottom: 20px; border-radius: 5px;">
            {% endif %}
            <h1>{{ i.name }}</h1>
            <div>
                {{ i.content|linebreaks }}
            </div>
        </div>
    {% endfor %}
</div>

{% endblock content %}
