{% extends "base.html" %}

{% block content %}


    <div class="navbar">

    <a href="{% url 'home' %}">🏠 Home</a>

    <a href="{% url 'blog' %}">📝 Blogs</a>


    {% if user.is_authenticated %}
        <a href="{% url 'blog-create' %}">➕ Create Blog</a>
    {% else %}
        <span class="warning">
            You need to Login to create a blog
        </span>
    {% endif %}

    <form method="GET" action="{% url 'blog' %}" style="display: inline-block; margin-left: 20px;">
        <input type="text" name="q" placeholder="Search blogs..." style="padding: 5px; border-radius: 5px; border: 1px solid #ccc;">
        <button type="submit" style="padding: 5px 10px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer;">Search</button>
    </form>
    
    </div>

    <hr>

    {% if user.is_authenticated %}
        <p>Welcome {{ user.username }}</p>
    {% else %}
        <p>Welcome Guest</p>
    {% endif %}

{% endblock content %}
